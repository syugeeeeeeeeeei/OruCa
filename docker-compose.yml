services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mysql:
    image: mysql:8.0.42-debian
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-OruCa_DB}
      MYSQL_USER: ${MYSQL_USER:-OruCa_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-OruCa_user_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Tokyo
    cap_add:
      - SYS_NICE
    volumes:
      - ./mysql/data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ${APPDATA_ROOT:-../../appdata/oruca}/mysql:/var/lib/mysql
      - ${APPDATA_ROOT:-../../appdata/oruca}/backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 3
      start_period: 10s
      timeout: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      DB_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE:-OruCa_DB}
      MYSQL_USER: ${MYSQL_USER:-OruCa_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-OruCa_user_pass}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      RUNTIME_CONFIG_DIR: /app/runtime-config
      TZ: Asia/Tokyo
    volumes:
      - ${APPDATA_ROOT:-../../appdata/oruca}/config:/app/runtime-config
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3000"

  nfc:
    build:
      context: nfc
    init: true
    restart: unless-stopped
    environment:
      TZ: Asia/Tokyo
      API_WS_URL: ws://api:3000/log/write
    command: ["python","main.py"]
    depends_on:
      - api
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
